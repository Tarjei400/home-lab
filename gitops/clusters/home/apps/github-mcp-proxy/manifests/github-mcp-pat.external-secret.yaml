# Classic GitHub PAT for the self-hosted github MCP server. Pulled from the
# `Claude Code Agent Env` 1Password item — field `GH_CLAUDE_CODE_TARJEI`
# (user-owned classic PAT with repo + read:org scopes) — and exposed as the
# env var GITHUB_PERSONAL_ACCESS_TOKEN that github-mcp-server reads.
#
# The 1Password Connect ESO provider matches by field label across the
# whole item (sections are flattened) and requires labels to be unique —
# see https://external-secrets.io/v0.5.4/provider-1password-automation/.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-mcp-pat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: github-mcp-pat-secret
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_PERSONAL_ACCESS_TOKEN
      remoteRef:
        key: Claude Code Agent Env
        property: GH_CLAUDE_CODE_TARJEI
