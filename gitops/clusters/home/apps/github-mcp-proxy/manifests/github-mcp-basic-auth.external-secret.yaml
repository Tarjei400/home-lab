# htpasswd-format Secret for nginx-ingress basic-auth at github-mcp.lab.techyon.dev.
#
# Pulls top-level `username` and `password` fields from the
# `Claude Code Agent Env` 1Password item and renders an htpasswd `auth`
# key via ESO's sprig `htpasswd` template helper (equivalent to running
# `htpasswd -nbBC 10 <username> <password>`).
#
# Claude Code clients pass it as:
#     "headers": { "Authorization": "Basic <base64(username:password)>" }
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-mcp-basic-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: github-mcp-basic-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        auth: "{{ htpasswd .username .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: Claude Code Agent Env
        property: username
    - secretKey: password
      remoteRef:
        key: Claude Code Agent Env
        property: password
