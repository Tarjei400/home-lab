# htpasswd-format Secret for nginx-ingress basic-auth at github-mcp.lab.techyon.dev.
#
# 1Password item `GH_MCP_BASIC_AUTH` must have two fields:
#   - username   (e.g. "mcp")
#   - password   (e.g. `openssl rand -base64 32`)
#
# ESO renders the `auth` key as a bcrypt htpasswd line using the sprig
# `htpasswd` function (available in ESO's template engine). Equivalent to
# running `htpasswd -nbBC 10 <username> <password>` on the host.
#
# Claude Code clients pass it as:
#     "headers": { "Authorization": "Basic <base64(username:password)>" }
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-mcp-basic-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: github-mcp-basic-auth
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        auth: "{{ htpasswd .username .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: GH_MCP_BASIC_AUTH
        property: username
    - secretKey: password
      remoteRef:
        key: GH_MCP_BASIC_AUTH
        property: password
