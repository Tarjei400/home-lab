apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperclip-secrets
spec:
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore

  target:
    name: paperclip-secrets
    creationPolicy: Owner

  data:
    - secretKey: betterAuthSecret
      remoteRef:
        key: Paperclip
        property: betterAuthSecret

    - secretKey: anthropicApiKey
      remoteRef:
        key: Paperclip
        property: anthropicApiKey
