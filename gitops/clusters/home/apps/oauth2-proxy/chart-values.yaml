# oauth2-proxy — Google Workspace SSO front door for lab services that
# have no native OIDC (Pi-hole, Homepage, Prometheus). Other services
# opt in by adding two nginx ingress annotations:
#   nginx.ingress.kubernetes.io/auth-url:    "https://oauth.lab.techyon.dev/oauth2/auth"
#   nginx.ingress.kubernetes.io/auth-signin: "https://oauth.lab.techyon.dev/oauth2/start?rd=$escaped_request_uri"
#
# Credentials come from the oauth2-proxy-creds Secret, populated by the
# ExternalSecret in external-secrets/manifests/google-oauth.external-secret.yaml
# which pulls from the shared 1Password GoogleOauthClient item.

config:
  existingSecret: oauth2-proxy-creds
  configFile: ""

extraArgs:
  provider: google
  email-domain: techyon.dev
  redirect-url: https://oauth.lab.techyon.dev/oauth2/callback
  # Cookie shared across all *.lab.techyon.dev subdomains so signing in
  # once at Pi-hole also authenticates the user at Homepage and Prometheus.
  cookie-domain: .lab.techyon.dev
  whitelist-domain: .lab.techyon.dev
  cookie-secure: "true"
  reverse-proxy: "true"
  set-xauthrequest: "true"
  pass-access-token: "true"
  pass-authorization-header: "true"
  # The upstream is only reached if someone hits oauth.lab.techyon.dev
  # directly — nginx auth-url flows only touch /oauth2/auth which is
  # served internally. static://202 just returns 202 for anything else.
  upstream: "static://202"

ingress:
  enabled: true
  className: nginx
  path: /
  pathType: Prefix
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: cloudflare-ca
    # Infra service — don't clutter the Homepage dashboard with it.
    gethomepage.dev/enabled: "false"
  hosts:
    - oauth.lab.techyon.dev
  tls:
    - secretName: oauth2-proxy-tls
      hosts:
        - oauth.lab.techyon.dev

service:
  type: ClusterIP

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi
