# Google OAuth credentials fanned out from a single 1Password item to the
# namespaces that need them. The 1Password item "GoogleOauthClient" holds the
# web application OAuth client created for the techyon.dev Workspace. See
# plan file for the full rationale.
#
# Each ExternalSecret sets metadata.namespace explicitly so a single file can
# create Secrets in multiple namespaces — ArgoCD's default AppProject permits
# any destination namespace, and the ExternalSecrets operator syncs each CR
# in place.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: google-oauth-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: argocd-google-oidc
    creationPolicy: Owner
    # ArgoCD's $<secret-name>:<field> reference lookup in argocd-cm only
    # resolves against Secrets that carry this label.
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: clientID
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthClientId.txt
    - secretKey: clientSecret
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthSecretId.txt
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: google-oauth-creds
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: grafana-google-oidc
    creationPolicy: Owner
  data:
    # Grafana reads GF_AUTH_GOOGLE_CLIENT_ID / GF_AUTH_GOOGLE_CLIENT_SECRET
    # from the environment and overrides the corresponding grafana.ini keys.
    - secretKey: GF_AUTH_GOOGLE_CLIENT_ID
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthClientId.txt
    - secretKey: GF_AUTH_GOOGLE_CLIENT_SECRET
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthSecretId.txt
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-creds
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-creds
    creationPolicy: Owner
  data:
    # Key names must be client-id / client-secret / cookie-secret —
    # the oauth2-proxy Helm chart hardcodes these as the secret key names
    # when config.existingSecret is set (see oauth2-proxy chart deployment
    # template around lines 183-203).
    - secretKey: client-id
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthClientId.txt
    - secretKey: client-secret
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthSecretId.txt
    - secretKey: cookie-secret
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthCookieSecret.txt
