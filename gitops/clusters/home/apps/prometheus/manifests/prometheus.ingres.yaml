apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: cloudflare-ca
    # Google Workspace SSO gate — Prometheus has no native auth, so
    # oauth2-proxy gates access to the metrics UI. rd= must include
    # https://$host because oauth2-proxy lives on a different subdomain.
    nginx.ingress.kubernetes.io/auth-url: "https://oauth.lab.techyon.dev/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://oauth.lab.techyon.dev/oauth2/start?rd=https://$host$escaped_request_uri"
    gethomepage.dev/description: Prometheus
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Monitoring
    gethomepage.dev/icon: prometheus.png
    gethomepage.dev/name: Prometheus
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - prometheus.lab.techyon.dev
      secretName: prometheus-tls
  rules:
    - host: prometheus.lab.techyon.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-operated
                port:
                  number: 9090