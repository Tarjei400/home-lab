# grafana/alloy chart — Deployment role: receives OTLP logs/traces/metrics from
# apps outside the cluster (LAN) and Grafana Faro browser telemetry from public
# frontends. Also receives Pyroscope profiles on :12348 from external apps.
#
# OTLP endpoints:
#   Ingress  otel.lab.techyon.dev  → :4318 (HTTP)
#   Cluster  alloy-gateway:4317    (gRPC, in-cluster only)
# Faro endpoint:
#   Ingress  faro.lab.techyon.dev/collect → :12347 (HTTP, x-api-key header gate)
# Pyroscope ingest (no-auth, machine push):
#   Ingress  pyroscope-ingest.lab.techyon.dev → :12348 (HTTP)
#
# The service this chart creates is named after the release (alloy-gateway).

fullnameOverride: alloy-gateway

controller:
  type: deployment
  replicas: 1

alloy:
  stabilityLevel: public-preview
  configMap:
    content: |
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces  = [otelcol.exporter.otlp.tempo.input]
          logs    = [otelcol.exporter.loki.default.input]
          metrics = [otelcol.exporter.prometheus.cluster.input]
        }
      }

      // Grafana Faro Web SDK receiver — browser telemetry (logs + traces).
      // Access gated by a shared secret delivered via the FARO_API_KEY env
      // var (see extraEnv below and faro-api-key.external-secret.yaml).
      // Browsers send the key in the `x-api-key` header; Alloy rejects any
      // request with a missing or mismatched key with HTTP 401.
      faro.receiver "browser" {
        server {
          listen_address           = "0.0.0.0"
          listen_port              = 12347
          cors_allowed_origins     = [
            "http://localhost:3000",
            "http://localhost:3001",
            "http://192.168.*",
            "http://*.svc.cluster.local",
            "https://*.techyon.dev",
          ]
          api_key                  = sys.env("FARO_API_KEY")
          max_allowed_payload_size = "10MiB"

          rate_limiting {
            enabled = true
            rate    = 100    // requests/second per remote address
          }
        }

        extra_log_labels = {
          source = "faro",
        }

        output {
          logs   = [loki.write.default.receiver]
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring.svc.cluster.local:4317"
          tls {
            insecure             = true
            insecure_skip_verify = true
          }
        }
      }

      otelcol.exporter.loki "default" {
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      // OTLP metrics → Prometheus remote_write (requires enableRemoteWriteReceiver on Prometheus CRD)
      otelcol.exporter.prometheus "cluster" {
        forward_to = [prometheus.remote_write.cluster.receiver]
      }

      prometheus.remote_write "cluster" {
        endpoint {
          url = "http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write"
        }
      }

      // Pyroscope profile ingest from external apps (no auth — gated by ingress hostname only).
      // Local Alloy pushes to https://pyroscope-ingest.lab.techyon.dev which routes here.
      pyroscope.receive_http "default" {
        http {
          listen_address = "0.0.0.0"
          listen_port    = 12348
        }
        forward_to = [pyroscope.write.cluster.receiver]
      }

      pyroscope.write "cluster" {
        endpoint {
          url = "http://pyroscope.monitoring.svc.cluster.local:4040"
        }
      }

  # FARO_API_KEY is read at Alloy startup and referenced via sys.env() in the
  # faro.receiver above. The Secret is populated by External Secrets from the
  # 1Password "FaroApiKey" item (see manifests/faro-api-key.external-secret.yaml).
  extraEnv:
    - name: FARO_API_KEY
      valueFrom:
        secretKeyRef:
          name: faro-api-key
          key: apiKey

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: faro
      port: 12347
      targetPort: 12347
      protocol: TCP
    - name: pyroscope-ingest
      port: 12348
      targetPort: 12348
      protocol: TCP

service:
  enabled: true
  type: ClusterIP

rbac:
  create: true

serviceAccount:
  create: true
